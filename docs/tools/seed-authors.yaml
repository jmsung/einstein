# Hand-curated mathematician + agent-AI author list per domain.
#
# Drives `seed_ingest.py author-sweep`: each author becomes one arxiv
# `au:"<name>"` query restricted to math.* categories. Top-N most recent
# hits are kept, filtered by relevance against concept-search-terms.yaml
# at apply time.
#
# Categories mirror the strategy_picker mapping (autocorrelation,
# sphere-packing, packing, discrete-combinatorics, functional-inequality,
# sieve, extremal-graph, agentic-harness). Authors may appear in multiple
# categories — the dedup happens at the candidate level (by arxiv abs_url),
# not the author level.
#
# Curated 2026-05-23 by reading the 64 existing source/ entries + the
# .claude/rules/council-dispatch.md persona roster. Add new authors as
# patterns emerge.

autocorrelation:
