# Wiki slug → arxiv-vocabulary translation
#
# Per `docs/wiki/findings/dead-end-slug-as-arxiv-phrase-query.md`: wiki slugs
# are agent-internal jargon, not literature vocabulary. Verbatim phrase queries
# against arxiv return ~0 hits. This file maps slugs to phrases that DO appear
# in the math literature.
#
# Schema:
#   <slug-with-.md-suffix>:
#     - "<phrase 1>"
#     - "<phrase 2>"
#     ...
#
# All phrases for a slug are OR-ed into one arxiv query (one API call per slug,
# preserves the rate-limit budget). Slugs not present here fall back to the
# slug-as-phrase strategy in seed_ingest.py (yields ~0 hits — by design, forces
# humans to add a mapping or accept the slug is unsearchable).
#
# Curated 2026-05-23 against the 36 actionable rows in concept-coverage.json.
# Add new mappings as the wiki grows. Empty list `[]` means "intentionally
# unmapped — slug is project-coined with no literature analog."

