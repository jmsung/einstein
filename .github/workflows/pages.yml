name: Deploy Pages

# Root-cause fix for the recurring "Deployment failed, try again later" noise:
#  - path filter: only content that is actually published (docs/wiki, narrative
#    pages, _config.yml) triggers a build+deploy. docs/paper/**, src/, tests/,
#    etc. no longer fire Pages at all.
#  - concurrency cancel-in-progress: a burst of pushes cancels superseded runs
#    cleanly instead of piling up and failing in the single-concurrency
#    github-pages environment.
on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
      - 'docs/*.md'
      - 'docs/posts/**'
      - 'docs/_config.yml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
