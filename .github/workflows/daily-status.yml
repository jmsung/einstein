name: Daily Arena Status

on:
  schedule:
    - cron: "0 18 * * *"  # 10am PST = 6pm UTC
  workflow_dispatch: # manual trigger

permissions:
  contents: write

jobs:
  update-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install numpy scipy matplotlib

      - name: Update arena status
        run: python scripts/update_status.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/status/ README.md
          git diff --staged --quiet || git commit -m "chore: daily arena status update"
          git push
