name: Tests

on:
  push:
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pytest
        # `-m "not slow"` skips perf-budget tests calibrated for M5 Max; CI
        # hardware (shared 2-vCPU x86_64) consistently misses those budgets
        # by 5-25% on FFT-heavy workloads. Local devs run all tests by
        # default; opt-in to perf checks via `uv run pytest -m slow tests/`.
        run: uv run pytest tests/ -v -m "not slow"
