# optimizer_manifest.yaml — per-problem optimizer dispatch entries.
#
# Read by src/einstein/optimizer_dispatch.py. Maps `problem_id` → available
# optimizers + how to invoke them. Adding a new problem = adding one block
# here. The optimizer script must accept the listed cli_args, write its
# result to `result_file` in the parser's expected shape, and exit 0 on
# success.
#
# Parser `json_score_payload`: result_file is JSON with required key
# `score` (float) and optional `payload` (dict). Recommended for new
# wirings — keeps the contract simple.
#
# Coverage (2026-06-01, manifest-coverage-sprint): 10 problems wired —
# P14 (slsqp_polish + mpmath_ulp_polish), P22 (stub), and 8 basin-locked
# problems (P2,4,5,11,15,16,18,19) via the generic verify_seed emitter. The
# remaining live problems are added incrementally as their scripts emit
# json_score_payload result files; P3/P10/P12 are deferred pending a clean
# in-repo seed (see docs/wiki/questions/2026-06-01-seed-backfill-gap-p3-p10-p12.md).

1:
  slug: erdos-overlap
  default: verify_seed
  optimizers:
    verify_seed:
      # Seed == our genuine best basin (0.38087031047814435, n=600), promoted
      # from the mb v2 backup — ~1.08e-9 BELOW arena #1 (0.3808703105862), so we
      # are effectively tied-SOTA at the Remez/minimax plateau and the Δ is far
      # below minImprovement=1e-7 (non-submittable; honest-zero expected). The
      # heavy Remez-bilinear-minimax + cutting-plane LP search lives in
      # scripts/erdos/ for record campaigns; this is the rank-current dispatch.
      script: scripts/verify_seed.py
      cli_args: ["--problem-id", "1"]
      timeout_seconds: 120
      result_file: results/erdos_overlap/verify_seed_result.json
      result_parser: json_score_payload

10:
  slug: thomson-n282
  default: verify_seed
  optimizers:
    verify_seed:
      # Seed == the Wales CCD putative global minimum for N=282 (xyz/282.xyz,
      # E=37147.2944184), fetched 2026-06-04 and re-scored to 37147.29441846 —
      # tying arena #1 (AlphaEvolve, same global min) to ~13 digits. A TIE, not
      # a strict improvement, so the auto-submit gate-1 rejects it (Δ ≈ 0 ≪
      # minImprovement); honest non-submittable. This corrects our prior board
      # entry (37147.5253, no in-repo backup) to the true global-min basin. The
      # heavy basin-hopping search stays in scripts/thomson/ for record runs.
      script: scripts/verify_seed.py
      cli_args: ["--problem-id", "10"]
      timeout_seconds: 120
      result_file: results/thomson/verify_seed_result.json
      result_parser: json_score_payload

14:
  slug: circle-packing-square
  # Default is `slsqp_polish` (strict tol=0). `newton_max` was DROPPED on
  # 2026-06-01 (Goal 6 Q-B of the manifest-coverage-sprint): it emits `sum_r`
  # (not `score`) to a gitignored `results-temp/` path — unparseable under
  # json_score_payload regardless of `--pair-gap` — and its argparse defaults
  # (`--pair-gap=-9e-10`) are the arena-tolerance-band exploit explicitly
  # rejected after the 2026-04-09 false-breakthrough 500-pt penalty (see
  # dead-end-newton-max-strict-tol-lockout-p14.md). `slsqp_polish` +
  # `mpmath_ulp_polish` cover P14 honestly; the script stays in scripts/ for
  # manual use.
  default: slsqp_polish
  optimizers:
    slsqp_polish:
      script: scripts/circle_packing_square/slsqp_polish.py
      cli_args: []
      timeout_seconds: 300
      result_file: results/circle_packing_square/slsqp_polish_result.json
      result_parser: json_score_payload
    mpmath_ulp_polish:
      # ULP-step coordinate descent (docs/wiki/techniques/mpmath-ulp-polish.md).
      # Succeeds slsqp_polish at the float64 ceiling: reclaims sub-ulp radius
      # slack the SLSQP line-search leaves behind. Every accepted move must pass
      # BOTH the arena float64 strict check (tol=0) AND mpmath-exact (gap ≥ 0) —
      # so it can never bank the 2026-04-09 tolerance-exploit (axiom A1). On the
      # current rank-2 seed it yields a triple-verified +6.617e-14 (below arena
      # minImprovement=1e-7, so not submittable — but the path is real and the
      # body generalizes to the float64-ceiling family, Phase 2a).
      script: scripts/circle_packing_square/mpmath_ulp_polish.py
      cli_args: ["--dps", "80", "--max-iter", "100"]
      timeout_seconds: 600
      result_file: results/circle_packing_square/mpmath_ulp_polish_result.json
      result_parser: json_score_payload

22:
  slug: kissing-d12
  default: stub_no_op
  optimizers:
    # Stub entry — wired only to test that strategy_picker output flows through
    # dispatch. The actual P22 first-order link-tangent + squeeze recipe lives
    # in scripts/p22_kissing_d12/ and needs a result-file emitter wrapper.
    stub_no_op:
      script: scripts/p22_kissing_d12/recon.py
      cli_args: ["--dry-run"]
      timeout_seconds: 60
      result_file: results/p22_kissing_d12/recon_result.json
      result_parser: json_score_payload

# ---------------------------------------------------------------------------
# verify_seed wirings (manifest-coverage-sprint, 2026-06-01).
#
# `verify_seed` is the rank-current dispatch emitter for basin-locked problems:
# it loads the best in-repo seed (scripts/<problem>/seeds/best.json[.gz]) and
# re-scores it through the audited arena evaluator — triple-verify checks #1+#2
# in one — then emits json_score_payload. This turns the long-standing
# `dispatch: no-manifest-entry` rows into real, triple-verified dispatches. The
# heavy search optimizers stay in scripts/<problem>/ for Phase-2 record runs.
# See scripts/verify_seed.py (SPECS registry) and the Goal-0 audit.
# ---------------------------------------------------------------------------

2:
  slug: first-autocorrelation
  default: verify_seed
  optimizers:
    verify_seed:
      # NOTE: best in-repo seed is the n=30000 basin (1.50286286). The arena-#1
      # n=90000 solution (1.502861628) was never backed up cleanly — a seed
      # backfill gap tracked in the deferral finding. Dispatch is still real;
      # the loop just won't see the absolute best until the 90k seed lands.
      script: scripts/verify_seed.py
      cli_args: ["--problem-id", "2"]
      timeout_seconds: 120
      result_file: results/first_autocorrelation/verify_seed_result.json
      result_parser: json_score_payload

