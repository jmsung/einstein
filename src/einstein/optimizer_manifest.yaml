# optimizer_manifest.yaml — per-problem optimizer dispatch entries.
#
# Read by src/einstein/optimizer_dispatch.py. Maps `problem_id` → available
# optimizers + how to invoke them. Adding a new problem = adding one block
# here. The optimizer script must accept the listed cli_args, write its
# result to `result_file` in the parser's expected shape, and exit 0 on
# success.
#
# Parser `json_score_payload`: result_file is JSON with required key
# `score` (float) and optional `payload` (dict). Recommended for new
# wirings — keeps the contract simple.
#
# Stub state (2026-05-24): only 2 example entries to exercise the dispatch
# infrastructure. Other 15 live problems will be added incrementally as
# their scripts are refactored to emit json_score_payload result files.

14:
  slug: circle-packing-square
  # Default is `slsqp_polish` (strict tol=0). `newton_max` is kept available
  # but NOT default — its argparse defaults (`--pair-gap=-9e-10`) are the
  # arena-tolerance-band exploit explicitly rejected after the 2026-04-09
  # false-breakthrough 500-pt penalty. See dead-end-newton-max-strict-tol-
  # lockout-p14.md (cycle 51 of the autonomous loop). When invoking
  # newton_max here we force `--pair-gap 0` so even an explicit pick stays
  # strict-tol-safe per axiom A1.
  default: slsqp_polish
  optimizers:
    slsqp_polish:
      script: scripts/circle_packing_square/slsqp_polish.py
      cli_args: []
      timeout_seconds: 300
      result_file: results/circle_packing_square/slsqp_polish_result.json
      result_parser: json_score_payload
    newton_max:
      script: scripts/circle_packing_square/newton_max.py
      # `--pair-gap 0` forces strict-disjoint (axiom A1). Without this, the
      # script defaults to `--pair-gap=-9e-10` (arena-tolerance exploit).
      cli_args: ["--pair-gap", "0"]
      timeout_seconds: 1800
      result_file: results/circle_packing_square/newton_max_result.json
      result_parser: json_score_payload

22:
  slug: kissing-d12
  default: stub_no_op
  optimizers:
    # Stub entry — wired only to test that strategy_picker output flows through
    # dispatch. The actual P22 first-order link-tangent + squeeze recipe lives
    # in scripts/p22_kissing_d12/ and needs a result-file emitter wrapper.
    stub_no_op:
      script: scripts/p22_kissing_d12/recon.py
      cli_args: ["--dry-run"]
      timeout_seconds: 60
      result_file: results/p22_kissing_d12/recon_result.json
      result_parser: json_score_payload
